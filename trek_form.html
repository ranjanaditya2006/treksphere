{% extends 'base.html' %}
{% block title %}{{ 'Edit' if trek else 'Create' }} Trek{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card shadow border-0">
      <div class="card-body p-4">
        <h2 class="h3 mb-3">{{ 'Edit' if trek else 'Create' }} Trek</h2>
        <form method="post" class="row g-3">
          <div class="col-md-6"><label class="form-label">Trek Name</label><input class="form-control" name="name" value="{{ trek.name if trek else '' }}" required></div>
          <div class="col-md-6"><label class="form-label">Location</label><input class="form-control" name="location" value="{{ trek.location if trek else '' }}" required></div>
          <div class="col-md-4"><label class="form-label">Difficulty</label><select class="form-select" name="difficulty">{% for d in ['Easy','Moderate','Hard'] %}<option value="{{ d }}" {% if trek and trek.difficulty == d %}selected{% endif %}>{{ d }}</option>{% endfor %}</select></div>
          <div class="col-md-4"><label class="form-label">Duration (days)</label><input type="number" class="form-control" name="duration_days" value="{{ trek.duration_days if trek else '' }}" required></div>
          <div class="col-md-4"><label class="form-label">Available Slots</label><input type="number" class="form-control" name="available_slots" value="{{ trek.available_slots if trek else '' }}" required></div>
          <div class="col-md-4"><label class="form-label">Start Date</label><input type="date" class="form-control" name="start_date" value="{{ trek.start_date if trek else '' }}" required></div>
          <div class="col-md-4"><label class="form-label">End Date</label><input type="date" class="form-control" name="end_date" value="{{ trek.end_date if trek else '' }}" required></div>
          <div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in ['Pending','Approved','Open','Closed','Completed'] %}<option value="{{ s }}" {% if trek and trek.status == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
          <div class="col-12"><label class="form-label">Assign Staff</label><select class="form-select" name="staff_id"><option value="">Unassigned</option>{% for s in staff_members %}<option value="{{ s.id }}" {% if trek and trek.staff_id == s.id %}selected{% endif %}>{{ s.name }} ({{ s.email }})</option>{% endfor %}</select></div>
          <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="4">{{ trek.description if trek else '' }}</textarea></div>
          <div class="col-12 d-grid"><button class="btn btn-success">Save Trek</button></div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
